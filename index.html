<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMC - Setup</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #FFFFFF; color: #000000; margin: 0; padding: 40px; display: flex; gap: 40px; justify-content: center; }
        .panel { background: #FFFFFF; border: 2px solid #000000; padding: 30px; width: 350px; box-shadow: 8px 8px 0px #000000; }
        h1 { font-size: 24px; font-weight: 700; text-transform: uppercase; border-bottom: 2px solid #000; padding-bottom: 10px; margin-top: 0; }
        label { font-weight: 700; display: block; margin-top: 15px; font-size: 12px; text-transform: uppercase; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; border: 2px solid #000; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        input:focus, select:focus { outline: none; background: #f0f0f0; }
        button { width: 100%; padding: 12px; margin-top: 20px; font-weight: 700; cursor: pointer; text-transform: uppercase; border: 2px solid #000; transition: all 0.2s; background: #FFFFFF; color: #000; }
        button:hover { background: #000; color: #FFF; }
        
        .face-tabs { display: flex; gap: 5px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 10px 0; text-align: center; border: 2px solid #000; cursor: pointer; font-weight: 700; background: #FFF; }
        .tab.active { background: #000; color: #FFF; }
        
        .canvas-container { position: relative; display: inline-block; border: 2px solid #000; background: #f9f9f9; box-shadow: 8px 8px 0px #000000; min-width: 400px; min-height: 400px;}
        #hudImage { max-width: 600px; display: block; pointer-events: none; }
        .selection-box { position: absolute; border: 2px dashed #000; background: rgba(0, 0, 0, 0.1); pointer-events: none; display: none; }
        .saved-box { position: absolute; border: 2px solid #000; background: rgba(126, 255, 126, 0.4); pointer-events: none; } /* 7eff7e opacity */
        
        #btnSync { background: #000; color: #7eff7e; font-size: 16px; border: 2px solid #000; }
        #btnSync:hover { background: #7eff7e; color: #000; }
        
        .status { margin-top: 15px; font-weight: 700; font-size: 14px; text-align: center; }
        .error { color: #ff3636; }
        .success { color: #7eff7e; background: #000; padding: 10px; }
    </style>
</head>
<body>

    <div class="panel">
        <h1>MMC Smart Setup</h1>
        
        <div class="face-tabs">
            <div class="tab active" onclick="switchFace(0)">FACE 0</div>
            <div class="tab" onclick="switchFace(1)">FACE 1</div>
            <div class="tab" onclick="switchFace(2)">FACE 2</div>
            <div class="tab" onclick="switchFace(3)">FACE 3</div>
        </div>

        <label>Comando:</label>
        <select id="cmdSelect">
            <option value="TEXTURE">TEXTURE</option>
            <option value="COLOR">COLOR</option>
            <option value="ALPHA">ALPHA</option>
            <option value="MAT_NORMAL">MAT_NORMAL</option>
            <option value="MAT_SPECULAR">MAT_SPECULAR</option>
        </select>
        
        <label>Valor (UUID, Cor <1,1,1>, etc):</label>
        <input type="text" id="valInput" placeholder="Ex: UUID da textura">
        
        <label>Target Mesh (Nome do prim ou ALL):</label>
        <input type="text" id="meshInput" value="ALL">
        
        <label>Target Face (Número ou ALL):</label>
        <input type="text" id="faceInput" value="ALL">
        
        <button id="addBtn">Gravar Área Desenhada</button>
        
        <hr style="border: 1px solid #000; margin: 30px 0;">
        
        <button id="btnSync">Sincronizar com SL</button>
        <div id="statusText" class="status"></div>
    </div>

    <div class="canvas-container" id="container">
        <img id="hudImage" src="" alt="Aguardando conexão com SL...">
        <div class="selection-box" id="selectionBox"></div>
        <div id="savedBoxes"></div>
    </div>

<script>
    // Leitura dos dados enviados pelo Second Life via URL
    const urlParams = new URLSearchParams(window.location.search);
    const apiUrl = urlParams.get('api');
    const textures = {
        0: urlParams.get('f0'),
        1: urlParams.get('f1'),
        2: urlParams.get('f2'),
        3: urlParams.get('f3')
    };

    let currentFace = 0;
    let buttonsData = []; // Armazena todos os botões
    
    const hudImage = document.getElementById('hudImage');
    const container = document.getElementById('container');
    const selectionBox = document.getElementById('selectionBox');
    const savedBoxesContainer = document.getElementById('savedBoxes');
    const statusText = document.getElementById('statusText');

    let isDrawing = false;
    let startX, startY, currentX, currentY;
    let currentUV = null;

    // Inicialização
    if(!apiUrl) {
        statusText.innerText = "Erro: Abra este painel através do clique longo no seu HUD no Second Life.";
        statusText.className = "status error";
    }
    switchFace(0);

    function switchFace(faceNum) {
        currentFace = faceNum;
        
        // Atualiza UI das Abas
        document.querySelectorAll('.tab').forEach((el, idx) => {
            el.className = idx === faceNum ? 'tab active' : 'tab';
        });

        // Puxa a textura direto dos servidores do Second Life
        const uuid = textures[faceNum];
        if (uuid && uuid !== "00000000-0000-0000-0000-000000000000") {
            hudImage.src = `https://secondlife.com/app/image/${uuid}/2`;
            hudImage.style.display = 'block';
        } else {
            hudImage.src = "";
            hudImage.alt = `Face ${faceNum} não possui textura aplicada.`;
        }
        
        renderSavedBoxes();
    }

    // Desenho das áreas no Canvas
    container.addEventListener('mousedown', (e) => {
        const rect = hudImage.getBoundingClientRect();
        if(e.clientX < rect.left || e.clientX > rect.right || e.clientY < rect.top || e.clientY > rect.bottom) return;
        
        startX = e.clientX - rect.left; startY = e.clientY - rect.top;
        isDrawing = true; selectionBox.style.display = 'block';
        updateBox(selectionBox, startX, startY, startX, startY);
    });

    container.addEventListener('mousemove', (e) => {
        if (!isDrawing) return;
        const rect = hudImage.getBoundingClientRect();
        currentX = Math.max(0, Math.min(e.clientX - rect.left, rect.width));
        currentY = Math.max(0, Math.min(e.clientY - rect.top, rect.height));
        updateBox(selectionBox, startX, startY, currentX, currentY);
    });

    container.addEventListener('mouseup', () => {
        if (!isDrawing) return;
        isDrawing = false;
        
        const width = hudImage.clientWidth; const height = hudImage.clientHeight;
        const uMin = (Math.min(startX, currentX) / width).toFixed(3);
        const uMax = (Math.max(startX, currentX) / width).toFixed(3);
        const vMin = (1.0 - (Math.max(startY, currentY) / height)).toFixed(3); // SL Invertido
        const vMax = (1.0 - (Math.min(startY, currentY) / height)).toFixed(3);

        currentUV = { uMin, uMax, vMin, vMax, startX, startY, currentX, currentY };
    });

    function updateBox(element, x1, y1, x2, y2) {
        element.style.left = Math.min(x1, x2) + 'px';
        element.style.top = Math.min(y1, y2) + 'px';
        element.style.width = Math.abs(x2 - x1) + 'px';
        element.style.height = Math.abs(y2 - y1) + 'px';
    }

    // Adiciona o botão na memória local do JS
    document.getElementById('addBtn').addEventListener('click', () => {
        if (!currentUV) return alert("Desenhe uma área na imagem primeiro!");

        const cmd = document.getElementById('cmdSelect').value;
        const val = document.getElementById('valInput').value || "NULL";
        const mesh = document.getElementById('meshInput').value || "ALL";
        const face = document.getElementById('faceInput').value || "ALL";

        buttonsData.push({
            face: currentFace,
            uv: currentUV,
            payload: `${cmd}|${val}|${mesh}|${face}`
        });

        selectionBox.style.display = 'none';
        currentUV = null;
        renderSavedBoxes();
    });

    // Renderiza os botões salvos na face atual
    function renderSavedBoxes() {
        savedBoxesContainer.innerHTML = '';
        buttonsData.forEach(btn => {
            if (btn.face === currentFace) {
                const box = document.createElement('div');
                box.className = 'saved-box';
                updateBox(box, btn.uv.startX, btn.uv.startY, btn.uv.currentX, btn.uv.currentY);
                savedBoxesContainer.appendChild(box);
            }
        });
    }

    // Sincronização via API para o Second Life
    document.getElementById('btnSync').addEventListener('click', () => {
        if (!apiUrl) return alert("URL de API não encontrada.");
        
        statusText.innerText = "Sincronizando...";
        statusText.className = "status";

        // Formata os dados no padrão que o LSL espera: Face^uMin^uMax^vMin^vMax^Payload\n
        let rawData = buttonsData.map(b => 
            `${b.face}^${b.uv.uMin}^${b.uv.uMax}^${b.uv.vMin}^${b.uv.vMax}^${b.payload}`
        ).join("\n");

        fetch(apiUrl, { method: "POST", body: rawData })
            .then(response => {
                statusText.innerText = "SINC OK! Verifique o HUD no SL.";
                statusText.className = "status success";
            })
            .catch(error => {
                // Como o CORS no LSL pode ser restrito em alguns visores, 
                // se falhar na leitura, o SL geralmente ainda recebeu o pacote.
                statusText.innerText = "Enviado! Se não funcionar, reinicie o script do HUD.";
                statusText.className = "status success";
            });
    });
</script>
</body>
</html>
