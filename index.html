<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MMC Smart Setup</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root{ --bg:#050505; --panel:#101010; --line:#202020; --text:#f3f3f3; --green:#7eff7e; --danger:#ff3636; --accent:#cfa3ff; }
*{ box-sizing:border-box; }
body{ margin:0; padding:20px; background:#050505; font-family:'Inter',sans-serif; color:var(--text); display:flex; justify-content:center; min-height:100vh; }
.container{ width:100%; max-width:1400px; display:flex; gap:20px; background:#0a0a0a; border:1px solid var(--line); border-radius:20px; padding:20px; }

/* LEFT PANEL */
.controls{ width:360px; display:flex; flex-direction:column; gap:16px; border-right:1px solid var(--line); padding-right:20px; }
h1{ margin:0; font-size:1.1rem; letter-spacing:3px; font-weight:800; color:var(--accent); text-transform:uppercase; }
.subtitle{ color:#666; font-size:11px; letter-spacing:1px; margin-top:-4px; margin-bottom:10px; }
.input-label{ font-size:10px; color:#888; font-weight:800; text-transform:uppercase; margin-bottom:6px; display:block; }
.input-box{ width:100%; background:#111; border:1px solid #222; color:#fff; padding:12px; border-radius:10px; outline:none; font-size:12px; font-family:monospace;}
.input-box:focus{ border-color:var(--accent); }
.btn{ border:none; padding:12px; border-radius:10px; cursor:pointer; font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:1px; width:100%; transition:.2s; }
.btn-white{ background:#fff; color:#000; }
.btn-white:hover{ background:#ddd; }
.btn-sync{ background:var(--green); color:#000; margin-top:10px; }
.btn-alt{ background:transparent; border:1px solid #333; color:#aaa; margin-top:10px; }
.btn-alt:hover{ border-color:#fff; color:#fff; }

.saved-list{ list-style:none; padding:0; margin:0; max-height:120px; overflow-y:auto; font-size:11px; color:#aaa; }
.saved-list li{ background:#111; padding:8px; border-radius:6px; margin-top:6px; border-left:3px solid var(--green); }

/* RIGHT PANEL - THE CANVAS */
.canvas-panel{ flex:1; display:flex; flex-direction:column; background:#0c0c0c; border:1px solid #202020; border-radius:14px; overflow:hidden; }
.canvas-header{ padding:14px 20px; background:#111; border-bottom:1px solid #202020; display:flex; justify-content:space-between; align-items:center; }
.canvas-title{ font-size:12px; font-weight:800; letter-spacing:1px; color:#fff; }

/* CHECKERBOARD BACKGROUND (Same as SL) */
.viewport{ 
    flex:1; overflow:auto; display:flex; justify-content:center; align-items:center; padding:40px;
    background-color: #222;
    background-image: linear-gradient(45deg, #1a1a1a 25%, transparent 25%, transparent 75%, #1a1a1a 75%, #1a1a1a),
                      linear-gradient(45deg, #1a1a1a 25%, transparent 25%, transparent 75%, #1a1a1a 75%, #1a1a1a);
    background-size: 20px 20px; background-position: 0 0, 10px 10px;
}

/* TIGHT IMAGE WRAPPER - This fixes the exact coordinate math */
#imageWrapper{ position:relative; box-shadow:0 10px 40px rgba(0,0,0,0.8); }
#hudImage{ display:block; max-width:800px; max-height:800px; pointer-events:none; }

.selection-box{ position:absolute; border:1px dashed var(--green); background:rgba(126,255,126,0.3); pointer-events:none; display:none; z-index:10; }
.saved-box{ position:absolute; border:1px solid var(--accent); background:rgba(207,163,255,0.3); pointer-events:none; z-index:5; }
#toast{ text-align:center; padding:10px; font-size:12px; font-weight:800; margin-top:10px; border-radius:8px; display:none; }
</style>
</head>
<body>

<div class="container">
    <div class="controls">
        <header>
            <h1>MMC MAPPER</h1>
            <div class="subtitle">Mapeamento Preciso de Interface</div>
        </header>

        <div>
            <span class="input-label">Ação do Botão</span>
            <select id="cmdSelect" class="input-box" style="margin-bottom:10px;">
                <option value="TEXTURE">TEXTURE</option>
                <option value="COLOR">COLOR</option>
                <option value="ALPHA">ALPHA</option>
                <option value="MAT_NORMAL">MAT_NORMAL</option>
                <option value="MAT_SPECULAR">MAT_SPECULAR</option>
            </select>
            
            <input type="text" id="valInput" class="input-box" placeholder="Valor (UUID, <1,1,1>, etc)" style="margin-bottom:10px;">
            
            <div style="display:flex; gap:10px; margin-bottom:16px;">
                <input type="text" id="meshInput" class="input-box" value="ALL" placeholder="Target Mesh">
                <input type="text" id="faceInput" class="input-box" value="ALL" placeholder="Target Face">
            </div>
            
            <button id="addBtn" class="btn btn-white">GRAVAR ÁREA DESENHADA</button>
        </div>

        <div style="margin-top:10px;">
            <span class="input-label" style="border-bottom:1px solid #222; padding-bottom:6px;">Botões Mapeados</span>
            <ul class="saved-list" id="mappedList"></ul>
        </div>
        
        <div style="margin-top:auto;">
            <button id="btnSync" class="btn btn-sync">SINCRONIZAR AUTOMÁTICO</button>
            <button id="btnCopy" class="btn btn-alt">COPIAR CÓDIGO MANUAL</button>
            <div id="toast"></div>
        </div>
    </div>

    <div class="canvas-panel">
        <div class="canvas-header">
            <div class="canvas-title" id="canvasTitle">AGUARDANDO CONEXÃO...</div>
            <div>
                <input type="text" id="manualUuid" class="input-box" style="width:200px; padding:6px 10px;" placeholder="UUID Manual (Fallback)">
                <button class="btn btn-white" style="width:auto; padding:6px 12px; margin-left:6px;" onclick="loadManual()">Carregar</button>
                <button class="btn btn-alt" style="width:auto; padding:6px 12px; margin:0 0 0 10px; color:var(--danger); border-color:var(--danger);" onclick="clearAll()">LIMPAR</button>
            </div>
        </div>

        <div class="viewport" id="viewport">
            <div id="imageWrapper" style="display:none;">
                <img id="hudImage" src="">
                <div class="selection-box" id="selectionBox"></div>
                <div id="savedBoxes"></div>
            </div>
            <div id="emptyText" style="color:#666; font-size:14px; font-weight:800; text-transform:uppercase; letter-spacing:1px; text-align:center;">
                Dê um clique longo no HUD no SL<br><span style="font-size:11px; font-weight:400;">(Ou cole a UUID no topo)</span>
            </div>
        </div>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const apiUrl = urlParams.get('api');
    const currentFace = urlParams.get('face') || "0";
    const textureUuid = urlParams.get('tex');

    let buttonsData = []; 
    const wrapper = document.getElementById('imageWrapper');
    const img = document.getElementById('hudImage');
    const selectionBox = document.getElementById('selectionBox');
    const savedBoxesContainer = document.getElementById('savedBoxes');
    const mappedList = document.getElementById('mappedList');
    const toast = document.getElementById('toast');

    if (textureUuid && textureUuid !== "00000000-0000-0000-0000-000000000000") {
        document.getElementById('canvasTitle').innerText = "MAPEANDO FACE " + currentFace;
        img.src = `https://secondlife.com/app/image/${textureUuid}/2`;
        wrapper.style.display = 'block';
        document.getElementById('emptyText').style.display = 'none';
    }

    function loadManual() {
        const uuid = document.getElementById('manualUuid').value.trim();
        if(uuid) {
            img.src = `https://secondlife.com/app/image/${uuid}/2`;
            wrapper.style.display = 'block';
            document.getElementById('emptyText').style.display = 'none';
        }
    }

    function showToast(msg, isErr=false) {
        toast.style.display = 'block';
        toast.innerText = msg;
        toast.style.background = isErr ? 'rgba(255,54,54,0.1)' : 'rgba(126,255,126,0.1)';
        toast.style.color = isErr ? 'var(--danger)' : 'var(--green)';
        setTimeout(() => toast.style.display='none', 4000);
    }

    function clearAll() { buttonsData = []; renderBoxes(); }

    // THE MATH FIX: Coordinate logic bound strictly to the image dimensions
    let isDrawing = false;
    let startX, startY, currentX, currentY, currentUV = null;

    wrapper.addEventListener('mousedown', (e) => {
        const rect = wrapper.getBoundingClientRect();
        startX = e.clientX - rect.left;
        startY = e.clientY - rect.top;
        isDrawing = true;
        selectionBox.style.display = 'block';
        updateBox(selectionBox, startX, startY, startX, startY);
    });

    window.addEventListener('mousemove', (e) => {
        if (!isDrawing) return;
        const rect = wrapper.getBoundingClientRect();
        currentX = Math.max(0, Math.min(e.clientX - rect.left, rect.width));
        currentY = Math.max(0, Math.min(e.clientY - rect.top, rect.height));
        updateBox(selectionBox, startX, startY, currentX, currentY);
    });

    window.addEventListener('mouseup', () => {
        if (!isDrawing) return;
        isDrawing = false;
        
        const w = wrapper.offsetWidth;
        const h = wrapper.offsetHeight;
        
        currentUV = {
            uMin: (Math.min(startX, currentX) / w).toFixed(3),
            uMax: (Math.max(startX, currentX) / w).toFixed(3),
            vMin: (1.0 - (Math.max(startY, currentY) / h)).toFixed(3), // SL Y Inversion
            vMax: (1.0 - (Math.min(startY, currentY) / h)).toFixed(3)
        };
    });

    function updateBox(el, x1, y1, x2, y2) {
        el.style.left = Math.min(x1, x2) + 'px';
        el.style.top = Math.min(y1, y2) + 'px';
        el.style.width = Math.abs(x2 - x1) + 'px';
        el.style.height = Math.abs(y2 - y1) + 'px';
    }

    document.getElementById('addBtn').addEventListener('click', () => {
        if (!currentUV) return showToast("Desenhe uma área na imagem!", true);
        const cmd = document.getElementById('cmdSelect').value;
        const val = document.getElementById('valInput').value || "NULL";
        const mesh = document.getElementById('meshInput').value || "ALL";
        const face = document.getElementById('faceInput').value || "ALL";
        
        buttonsData.push({ uv: currentUV, payload: `${cmd}|${val}|${mesh}|${face}` });
        selectionBox.style.display = 'none'; currentUV = null;
        renderBoxes();
    });

    function renderBoxes() {
        savedBoxesContainer.innerHTML = ''; mappedList.innerHTML = '';
        buttonsData.forEach((b, i) => {
            const w = wrapper.offsetWidth; const h = wrapper.offsetHeight;
            const div = document.createElement('div');
            div.className = 'saved-box';
            div.style.left = (b.uv.uMin * w) + 'px';
            div.style.width = ((b.uv.uMax - b.uv.uMin) * w) + 'px';
            div.style.top = ((1.0 - b.uv.vMax) * h) + 'px';
            div.style.height = ((b.uv.vMax - b.uv.vMin) * h) + 'px';
            savedBoxesContainer.appendChild(div);
            mappedList.innerHTML += `<li>[${i+1}] ${b.payload}</li>`;
        });
    }

    function buildPayload() {
        let raw = `FACE:${currentFace}\n`;
        raw += buttonsData.map(b => `${b.uv.uMin}^${b.uv.uMax}^${b.uv.vMin}^${b.uv.vMax}^${b.payload}`).join("\n");
        return raw;
    }

    // Auto Sync
    document.getElementById('btnSync').addEventListener('click', () => {
        if (!apiUrl) return showToast("HUD não conectado. Use o modo Manual.", true);
        if (buttonsData.length === 0) return showToast("Adicione botões primeiro.", true);
        showToast("Enviando...");
        
        fetch(apiUrl, { method: "POST", headers: { "Content-Type": "text/plain" }, body: buildPayload() })
        .then(res => showToast("Sincronizado via HTTP com sucesso!"))
        .catch(err => showToast("Enviado. Se o HUD não apitou, use o modo Manual.", true));
    });

    // Fallback: Copiar código manual (Chat Applier)
    document.getElementById('btnCopy').addEventListener('click', () => {
        if (buttonsData.length === 0) return showToast("Adicione botões primeiro.", true);
        const dataStr = buildPayload().replace(/\n/g, "##");
        const chatCommand = `/99 UPDATE_HUD|${dataStr}`;
        navigator.clipboard.writeText(chatCommand).then(() => {
            showToast("Código copiado! Cole no chat local do SL (Ctrl+V)");
        });
    });
</script>
</body>
</html>
