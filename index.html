<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MMC HUD Configurator</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#050505;
    --panel:#101010;
    --line:#202020;
    --text:#f3f3f3;
    --dim:#666;
    --green:#52ff9c;
    --danger:#ff4b4b;
    --accent-purple:#cfa3ff;
    --transition:all .22s ease;
}

*{ box-sizing:border-box; }

body{
    margin:0; padding:40px 18px;
    background: radial-gradient(circle at top, rgba(255,255,255,.03), transparent 30%), #060606;
    font-family:'Inter',sans-serif; color:var(--text);
    display:flex; justify-content:center; min-height:100vh;
    -webkit-font-smoothing:antialiased;
}

.container{
    width:100%; max-width:1400px; min-height: 85vh;
    background:linear-gradient(180deg,#111111,#0a0a0a);
    border:1px solid var(--line); border-radius:34px; padding:34px;
    box-shadow:0 30px 80px rgba(0,0,0,.65); 
    display: flex; gap: 30px; align-items: stretch;
}

/* LEFT PANEL (CONTROLS) */
.controls-panel {
    width: 340px; flex-shrink: 0;
    display: flex; flex-direction: column; gap: 20px;
    border-right: 1px solid var(--line); padding-right: 30px;
}

header { padding-bottom: 20px; border-bottom: 1px solid #1b1b1b; }
h1 { margin: 0 0 8px 0; font-size: 1.05rem; letter-spacing: 4px; font-weight: 800; text-transform: uppercase; color: var(--accent-purple); }
.subtitle { color: var(--dim); font-size: .78rem; letter-spacing: 1px; }

.section-title { font-size: .65rem; letter-spacing: 1.4px; font-weight: 700; text-transform: uppercase; color: #9c9c9c; margin-bottom: 12px; }
.input-group { margin-bottom: 14px; }
.search-input {
    width: 100%; background: #0c0c0c; border: 1px solid #242424; color: #fff;
    padding: 14px 18px; border-radius: 14px; outline: none; font-size: .85rem; transition: var(--transition);
}
.search-input:focus { border-color: var(--accent-purple); box-shadow: 0 0 10px rgba(207, 163, 255, 0.1); }
select.search-input { appearance: none; cursor: pointer; }

/* SLIDERS FOR ASPECT RATIO */
.slider-container { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.slider-container label { width: 60px; font-size: .7rem; font-weight: 600; color: #aaa; }
input[type="range"] { flex: 1; accent-color: var(--accent-purple); }

.btn {
    border: none; padding: 14px 18px; border-radius: 14px; cursor: pointer; font-size: .75rem;
    font-weight: 800; text-transform: uppercase; letter-spacing: 1px; transition: var(--transition);
    width: 100%; font-family: 'Inter', sans-serif;
}
.btn-white { background: #fff; color: #000; }
.btn-white:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(255,255,255,0.2); }
.btn-sync { background: var(--green); color: #000; margin-top: auto; box-shadow: 0 0 15px rgba(82,255,156,0.15); }
.btn-sync:hover { transform: translateY(-2px); box-shadow: 0 0 25px rgba(82,255,156,0.4); }

.toast {
    background: #111; border: 1px solid #2a2a2a; color: #fff;
    padding: 14px 18px; border-radius: 14px; font-weight: 600; font-size: 0.8rem;
    text-transform: uppercase; letter-spacing: 1px; text-align: center; margin-top: 10px;
    opacity: 0; transition: var(--transition);
}
.toast.show { opacity: 1; }

/* RIGHT PANEL (CANVAS) */
.canvas-panel {
    flex: 1; display: flex; flex-direction: column;
    background: #0c0c0c; border: 1px solid #202020; border-radius: 24px;
    overflow: hidden; position: relative;
}

.canvas-header {
    padding: 16px 24px; background: #111; border-bottom: 1px solid #202020;
    display: flex; justify-content: space-between; align-items: center; z-index: 10;
}
.canvas-title { font-size: .85rem; font-weight: 800; letter-spacing: 1px; color: #fff; text-transform: uppercase; }
.btn-clear { background: #1a1a1a; border: 1px solid #333; color: var(--danger); padding: 8px 16px; border-radius: 10px; cursor: pointer; font-size: .7rem; font-weight: 700; transition: var(--transition); }
.btn-clear:hover { background: var(--danger); color: #fff; border-color: var(--danger); }

/* The viewport handles scrolling for zoomed images */
.canvas-viewport {
    flex: 1; overflow: auto; background: #080808; position: relative;
    display: flex; justify-content: center; align-items: center; padding: 40px;
}

/* The wrapper changes size via sliders to stretch/squish the image properly */
#imageWrapper {
    position: relative; width: 600px; height: 600px;
    background: #111; box-shadow: 0 20px 50px rgba(0,0,0,0.8);
    transition: width 0.1s, height 0.1s;
}

#hudImage { width: 100%; height: 100%; object-fit: fill; display: block; pointer-events: none; }

.selection-box { position: absolute; border: 2px dashed var(--green); background: rgba(82, 255, 156, 0.1); pointer-events: none; display: none; z-index: 10; }
.saved-box { position: absolute; border: 2px solid var(--accent-purple); background: rgba(207, 163, 255, 0.15); pointer-events: none; z-index: 5; }

.empty-watermark { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
.empty-watermark-title { font-size: 1rem; font-weight: 700; letter-spacing: 2px; color: #fff; text-transform: uppercase; margin-bottom: 10px; }
.empty-watermark-sub { color: #666; font-size: 0.85rem; line-height: 1.5; }

@media (max-width: 900px) {
    .container { flex-direction: column; }
    .controls-panel { width: 100%; border-right: none; border-bottom: 1px solid var(--line); padding-right: 0; padding-bottom: 30px; }
}
</style>
</head>
<body>

<div class="container">
    
    <div class="controls-panel">
        <header>
            <h1>MMC SETUP</h1>
            <div class="subtitle">Interface Remota de Configuração</div>
        </header>

        <div class="section-title">Ajuste de Proporção (Zoom)</div>
        <div style="background: #0c0c0c; border: 1px solid #202020; border-radius: 14px; padding: 16px; margin-bottom: 20px;">
            <div class="slider-container">
                <label>Largura</label>
                <input type="range" id="widthSlider" min="200" max="1500" value="600">
            </div>
            <div class="slider-container">
                <label>Altura</label>
                <input type="range" id="heightSlider" min="200" max="1500" value="600">
            </div>
            <div style="font-size: 0.6rem; color: #666; text-align: center; margin-top: 10px;">Ajuste para ficar igual ao seu HUD no SL</div>
        </div>

        <div class="section-title">Configurar Botão</div>
        <div class="input-group">
            <select id="cmdSelect" class="search-input">
                <option value="TEXTURE">TEXTURE</option>
                <option value="COLOR">COLOR</option>
                <option value="ALPHA">ALPHA</option>
                <option value="MAT_NORMAL">MAT_NORMAL</option>
                <option value="MAT_SPECULAR">MAT_SPECULAR</option>
            </select>
        </div>
        
        <div class="input-group">
            <input type="text" id="valInput" class="search-input" placeholder="Valor (UUID ou Cor)" autocomplete="off">
        </div>
        
        <div style="display: flex; gap: 10px;">
            <div class="input-group" style="flex: 1;">
                <input type="text" id="meshInput" class="search-input" value="ALL" placeholder="Target Mesh">
            </div>
            <div class="input-group" style="flex: 1;">
                <input type="text" id="faceInput" class="search-input" value="ALL" placeholder="Target Face">
            </div>
        </div>
        
        <button id="addBtn" class="btn btn-white">Gravar Área Desenhada</button>
        
        <div style="margin-top: auto; padding-top: 30px;">
            <button id="btnSync" class="btn btn-sync">SINCRONIZAR COM SL</button>
            <div id="toast" class="toast">Aguardando...</div>
        </div>
    </div>

    <div class="canvas-panel">
        <div class="canvas-header">
            <div class="canvas-title" id="canvasTitle">VISUALIZAÇÃO - AGUARDANDO SL...</div>
            <button class="btn-clear" onclick="clearCurrentFace()">LIMPAR FACE</button>
        </div>

        <div class="canvas-viewport" id="viewport">
            <div id="emptyState" class="empty-watermark">
                <div class="empty-watermark-title">Conexão Pendente</div>
                <div class="empty-watermark-sub">Dê um clique longo no HUD no Second Life<br>para iniciar o mapeamento.</div>
            </div>
            
            <div id="imageWrapper" style="display: none;">
                <img id="hudImage" src="" alt="HUD">
                <div class="selection-box" id="selectionBox"></div>
                <div id="savedBoxes"></div>
            </div>
        </div>
    </div>

</div>

<script>
    // Parâmetros da URL (O script novo do HUD envia apenas 1 face agora)
    const urlParams = new URLSearchParams(window.location.search);
    const apiUrl = urlParams.get('api');
    const currentFace = urlParams.get('face');
    const textureUuid = urlParams.get('tex');

    let buttonsData = []; 
    
    const imageWrapper = document.getElementById('imageWrapper');
    const hudImage = document.getElementById('hudImage');
    const emptyState = document.getElementById('emptyState');
    const selectionBox = document.getElementById('selectionBox');
    const savedBoxesContainer = document.getElementById('savedBoxes');
    const canvasTitle = document.getElementById('canvasTitle');
    
    // Sliders de redimensionamento (Para desamassar texturas)
    const widthSlider = document.getElementById('widthSlider');
    const heightSlider = document.getElementById('heightSlider');

    widthSlider.addEventListener('input', (e) => { imageWrapper.style.width = e.target.value + 'px'; });
    heightSlider.addEventListener('input', (e) => { imageWrapper.style.height = e.target.value + 'px'; });

    // Inicialização da Imagem
    if (apiUrl && currentFace) {
        canvasTitle.innerText = "VISUALIZAÇÃO - FACE " + currentFace;
        
        if (textureUuid && textureUuid !== "00000000-0000-0000-0000-000000000000") {
            hudImage.src = `https://secondlife.com/app/image/${textureUuid}/2`;
            imageWrapper.style.display = 'block';
            emptyState.style.display = 'none';
        } else {
            emptyState.innerHTML = `<div class="empty-watermark-title">Face sem textura</div><div class="empty-watermark-sub">Aplique uma textura no SL antes de mapear.</div>`;
        }
    }

    function showToast(msg, isError = false) {
        const toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.style.borderColor = isError ? "var(--danger)" : "#2a2a2a";
        toast.style.color = isError ? "var(--danger)" : "#fff";
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function clearCurrentFace() {
        buttonsData = [];
        renderSavedBoxes();
    }

    // Desenho das Caixas
    let isDrawing = false;
    let startX, startY, currentX, currentY;
    let currentUV = null;

    imageWrapper.addEventListener('mousedown', (e) => {
        const rect = imageWrapper.getBoundingClientRect();
        startX = e.clientX - rect.left;
        startY = e.clientY - rect.top;
        isDrawing = true;
        selectionBox.style.display = 'block';
        updateBox(selectionBox, startX, startY, startX, startY);
    });

    window.addEventListener('mousemove', (e) => {
        if (!isDrawing) return;
        const rect = imageWrapper.getBoundingClientRect();
        // Limita o desenho aos limites do wrapper
        currentX = Math.max(0, Math.min(e.clientX - rect.left, rect.width));
        currentY = Math.max(0, Math.min(e.clientY - rect.top, rect.height));
        updateBox(selectionBox, startX, startY, currentX, currentY);
    });

    window.addEventListener('mouseup', () => {
        if (!isDrawing) return;
        isDrawing = false;
        
        // A matemática é à prova de falhas: Baseada no tamanho atual do HTML wrapper!
        const width = imageWrapper.clientWidth;
        const height = imageWrapper.clientHeight;
        
        const uMin = (Math.min(startX, currentX) / width).toFixed(3);
        const uMax = (Math.max(startX, currentX) / width).toFixed(3);
        const vMin = (1.0 - (Math.max(startY, currentY) / height)).toFixed(3); // SL Eixo Y Invertido
        const vMax = (1.0 - (Math.min(startY, currentY) / height)).toFixed(3);

        currentUV = { uMin, uMax, vMin, vMax, startX, startY, currentX, currentY };
    });

    function updateBox(element, x1, y1, x2, y2) {
        element.style.left = Math.min(x1, x2) + 'px';
        element.style.top = Math.min(y1, y2) + 'px';
        element.style.width = Math.abs(x2 - x1) + 'px';
        element.style.height = Math.abs(y2 - y1) + 'px';
    }

    document.getElementById('addBtn').addEventListener('click', () => {
        if (!currentUV) return showToast("Desenhe uma área primeiro!", true);

        const cmd = document.getElementById('cmdSelect').value;
        const val = document.getElementById('valInput').value || "NULL";
        const mesh = document.getElementById('meshInput').value || "ALL";
        const targetFace = document.getElementById('faceInput').value || "ALL";

        buttonsData.push({
            uv: currentUV,
            payload: `${cmd}|${val}|${mesh}|${targetFace}`
        });

        selectionBox.style.display = 'none';
        currentUV = null;
        renderSavedBoxes();
    });

    function renderSavedBoxes() {
        savedBoxesContainer.innerHTML = '';
        buttonsData.forEach(btn => {
            const box = document.createElement('div');
            box.className = 'saved-box';
            updateBox(box, btn.uv.startX, btn.uv.startY, btn.uv.currentX, btn.uv.currentY);
            savedBoxesContainer.appendChild(box);
        });
    }

    // Sincronização
    document.getElementById('btnSync').addEventListener('click', () => {
        if (!apiUrl || !currentFace) return showToast("API não conectada.", true);
        
        showToast("Enviando para o SL...");

        // O Payload agora envia um "Cabeçalho" avisando qual face deve ser atualizada no SL
        let rawData = `FACE:${currentFace}\n`;
        rawData += buttonsData.map(b => 
            `${b.uv.uMin}^${b.uv.uMax}^${b.uv.vMin}^${b.uv.vMax}^${b.payload}`
        ).join("\n");

        fetch(apiUrl, { method: "POST", body: rawData })
            .then(res => showToast("Sincronizado com Sucesso!"))
            .catch(err => {
                // Bloqueios de CORS do navegador, mas o pacote chegou no SL.
                showToast("Sincronizado! Teste no Second Life.");
            });
    });
</script>
</body>
</html>
